<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stereo Vida 102.3 — Admin</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="app-layout">

  <!-- Sidebar -->
  <aside id="sidebar" class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <span class="sidebar-freq">102.3</span>
        <span class="sidebar-name">STEREO VIDA</span>
      </div>
    </div>
    <nav id="sidebar-nav" class="sidebar-nav"></nav>
    <div class="sidebar-footer">
      <button class="btn-logout" onclick="Auth.logout()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>
        Cerrar sesión
      </button>
    </div>
  </aside>

  <!-- Main -->
  <div class="app-body">
    <header class="topbar">
      <button class="hamburger" onclick="toggleSidebar()" aria-label="Menú">
        <span></span><span></span><span></span>
      </button>
      <span class="topbar-title">Panel de Administración</span>
      <div class="topbar-actions">
        <button class="btn-publish" id="publish-btn" onclick="publishAll()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          <span class="publish-label">Enviar cambios</span>
          <span class="pending-badge hidden" id="pending-badge">0</span>
        </button>
      </div>
    </header>
    <main id="main-content" class="main-content"></main>
  </div>

  <!-- Scripts — order matters -->
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/sections/config.js"></script>
  <script src="js/sections/shows.js"></script>
  <script src="js/sections/splash.js"></script>
  <script src="js/sections/ads.js"></script>
  <script src="js/sections/social.js"></script>
  <script src="js/sections/events.js"></script>
  <script src="js/sections/promotions.js"></script>
  <script src="js/sections/recordings.js"></script>
  <script src="js/sections/usuarios.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
