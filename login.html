<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stereo Vida 102.3 — Admin</title>
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    .otp-input {
      letter-spacing: 6px;
      font-size: 22px;
      font-weight: 700;
      text-align: center;
    }
    .login-email-hint {
      text-align: center;
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 20px;
    }
    .login-email-hint strong { color: var(--text); }
    .resend-row {
      text-align: center;
      margin-top: 16px;
      font-size: 13px;
      color: var(--text-muted);
    }
    .resend-row button {
      color: var(--primary);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 13px;
      padding: 0;
    }
    .resend-row button:disabled { opacity: 0.4; cursor: default; }
    .back-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: var(--text-muted);
      cursor: pointer;
    }
    .back-link:hover { color: var(--primary); }
    .divider-row {
      display: flex; align-items: center; gap: 10px;
      margin: 20px 0; color: var(--text-muted); font-size: 12px;
    }
    .divider-row::before, .divider-row::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }
    .btn-ghost-sm {
      width: 100%; padding: 10px; border-radius: var(--radius-sm);
      border: 1px solid var(--border); color: var(--text-muted);
      font-size: 13px; background: transparent;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-ghost-sm:hover { border-color: var(--primary); color: var(--text); }
  </style>
</head>
<body class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-text">
        <span class="freq">102.3</span>
        <span class="name">STEREO VIDA FM</span>
      </div>
    </div>
    <h2 class="login-title">Panel de Administración</h2>

    <!-- Paso 1: Ingresar correo -->
    <div id="step-email">
      <form id="form-email" autocomplete="on">
        <div class="field">
          <label for="email">Correo electrónico</label>
          <input id="email" type="email" autocomplete="email" placeholder="admin@ejemplo.com" required />
        </div>
        <p id="email-error" class="error-msg hidden"></p>
        <button type="submit" id="btn-send" class="btn btn-primary btn-full">
          <span id="btn-send-text">Enviar código</span>
          <span id="btn-send-spinner" class="spinner hidden"></span>
        </button>
      </form>

      <div class="divider-row">o</div>
      <button class="btn-ghost-sm" onclick="showPasswordForm()">Iniciar sesión con contraseña</button>
    </div>

    <!-- Paso 2: Ingresar código OTP -->
    <div id="step-otp" class="hidden">
      <p class="login-email-hint">Enviamos un código a<br><strong id="otp-email-display"></strong></p>
      <form id="form-otp">
        <div class="field">
          <label for="otp-code">Código de verificación</label>
          <input id="otp-code" type="text" inputmode="numeric" pattern="[0-9]*"
                 maxlength="8" class="otp-input" placeholder="••••••" required autocomplete="one-time-code" />
        </div>
        <p id="otp-error" class="error-msg hidden"></p>
        <button type="submit" id="btn-verify" class="btn btn-primary btn-full">
          <span id="btn-verify-text">Verificar código</span>
          <span id="btn-verify-spinner" class="spinner hidden"></span>
        </button>
      </form>
      <div class="resend-row">
        ¿No llegó? <button id="btn-resend" onclick="resendCode()">Reenviar</button>
        <span id="resend-timer"></span>
      </div>
      <span class="back-link" onclick="showEmailStep()">← Cambiar correo</span>
    </div>

    <!-- Fallback: contraseña -->
    <div id="step-password" class="hidden">
      <form id="form-password" autocomplete="on">
        <div class="field">
          <label for="pw-email">Correo electrónico</label>
          <input id="pw-email" type="email" autocomplete="email" placeholder="admin@ejemplo.com" required />
        </div>
        <div class="field">
          <label for="password">Contraseña</label>
          <input id="password" type="password" autocomplete="current-password" placeholder="••••••••" required />
        </div>
        <p id="pw-error" class="error-msg hidden"></p>
        <button type="submit" id="btn-pw" class="btn btn-primary btn-full">
          <span id="btn-pw-text">Iniciar sesión</span>
          <span id="btn-pw-spinner" class="spinner hidden"></span>
        </button>
      </form>
      <span class="back-link" onclick="showEmailStep()">← Volver</span>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script>
    if (Auth.isLoggedIn()) window.location.href = 'index.html';

    let currentOtpId = null;
    let currentEmail = '';
    let resendCountdown = null;

    // ── Paso 1: solicitar código ──────────────────────────────────────────
    document.getElementById('form-email').addEventListener('submit', async (e) => {
      e.preventDefault();
      await sendCode(document.getElementById('email').value.trim());
    });

    async function sendCode(email) {
      const btn = document.getElementById('btn-send');
      const btnText = document.getElementById('btn-send-text');
      const spinner = document.getElementById('btn-send-spinner');
      const errorEl = document.getElementById('email-error');

      btn.disabled = true;
      btnText.textContent = 'Enviando...';
      spinner.classList.remove('hidden');
      errorEl.classList.add('hidden');

      const result = await Auth.requestOtp(email);

      if (result.success) {
        currentOtpId = result.otpId;
        currentEmail = email;
        document.getElementById('otp-email-display').textContent = email;
        showOtpStep();
        startResendTimer(60);
      } else {
        errorEl.textContent = 'No se pudo enviar el código. Verifica el correo e intenta de nuevo.';
        errorEl.classList.remove('hidden');
      }

      btn.disabled = false;
      btnText.textContent = 'Enviar código';
      spinner.classList.add('hidden');
    }

    // ── Paso 2: verificar código ──────────────────────────────────────────
    document.getElementById('form-otp').addEventListener('submit', async (e) => {
      e.preventDefault();
      const code = document.getElementById('otp-code').value.trim();
      const btn = document.getElementById('btn-verify');
      const btnText = document.getElementById('btn-verify-text');
      const spinner = document.getElementById('btn-verify-spinner');
      const errorEl = document.getElementById('otp-error');

      btn.disabled = true;
      btnText.textContent = 'Verificando...';
      spinner.classList.remove('hidden');
      errorEl.classList.add('hidden');

      const result = await Auth.loginWithOtp(currentOtpId, code);

      if (result.success) {
        window.location.href = 'index.html';
      } else {
        errorEl.textContent = 'Código incorrecto o expirado. Intenta de nuevo.';
        errorEl.classList.remove('hidden');
        btn.disabled = false;
        btnText.textContent = 'Verificar código';
        spinner.classList.add('hidden');
        document.getElementById('otp-code').value = '';
        document.getElementById('otp-code').focus();
      }
    });

    // ── Reenviar código ───────────────────────────────────────────────────
    async function resendCode() {
      await sendCode(currentEmail);
    }

    function startResendTimer(seconds) {
      const btn = document.getElementById('btn-resend');
      const timer = document.getElementById('resend-timer');
      btn.disabled = true;
      let remaining = seconds;

      clearInterval(resendCountdown);
      resendCountdown = setInterval(() => {
        remaining--;
        timer.textContent = ` (${remaining}s)`;
        if (remaining <= 0) {
          clearInterval(resendCountdown);
          btn.disabled = false;
          timer.textContent = '';
        }
      }, 1000);
    }

    // ── Fallback: contraseña ──────────────────────────────────────────────
    document.getElementById('form-password').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('pw-email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('btn-pw');
      const btnText = document.getElementById('btn-pw-text');
      const spinner = document.getElementById('btn-pw-spinner');
      const errorEl = document.getElementById('pw-error');

      btn.disabled = true;
      btnText.textContent = 'Ingresando...';
      spinner.classList.remove('hidden');
      errorEl.classList.add('hidden');

      const result = await Auth.loginWithPassword(email, password);

      if (result.success) {
        window.location.href = 'index.html';
      } else {
        errorEl.textContent = 'Correo o contraseña incorrectos.';
        errorEl.classList.remove('hidden');
        btn.disabled = false;
        btnText.textContent = 'Iniciar sesión';
        spinner.classList.add('hidden');
      }
    });

    // ── Navegación entre pasos ────────────────────────────────────────────
    function showEmailStep() {
      document.getElementById('step-email').classList.remove('hidden');
      document.getElementById('step-otp').classList.add('hidden');
      document.getElementById('step-password').classList.add('hidden');
      document.getElementById('otp-code').value = '';
      clearInterval(resendCountdown);
    }

    function showOtpStep() {
      document.getElementById('step-email').classList.add('hidden');
      document.getElementById('step-otp').classList.remove('hidden');
      document.getElementById('step-password').classList.add('hidden');
      setTimeout(() => document.getElementById('otp-code').focus(), 100);
    }

    function showPasswordForm() {
      document.getElementById('step-email').classList.add('hidden');
      document.getElementById('step-otp').classList.add('hidden');
      document.getElementById('step-password').classList.remove('hidden');
      document.getElementById('pw-email').value = document.getElementById('email').value;
      document.getElementById('pw-email').focus();
    }
  </script>
</body>
</html>
