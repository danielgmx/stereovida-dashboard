<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stereo Vida 102.3 — Admin</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-text">
        <span class="freq">102.3</span>
        <span class="name">STEREO VIDA FM</span>
      </div>
    </div>
    <h2 class="login-title">Panel de Administración</h2>
    <form id="login-form" autocomplete="on">
      <div class="field">
        <label for="email">Correo electrónico</label>
        <input id="email" type="email" autocomplete="email" placeholder="admin@ejemplo.com" required />
      </div>
      <div class="field">
        <label for="password">Contraseña</label>
        <input id="password" type="password" autocomplete="current-password" placeholder="••••••••" required />
      </div>
      <p id="login-error" class="error-msg hidden"></p>
      <button type="submit" id="login-btn" class="btn btn-primary btn-full">
        <span id="login-btn-text">Iniciar sesión</span>
        <span id="login-spinner" class="spinner hidden"></span>
      </button>
    </form>
  </div>
  <script src="js/auth.js"></script>
  <script>
    // Redirect if already logged in
    if (Auth.isLoggedIn()) window.location.href = 'index.html';

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      const btnText = document.getElementById('login-btn-text');
      const spinner = document.getElementById('login-spinner');
      const errorEl = document.getElementById('login-error');

      btn.disabled = true;
      btnText.textContent = 'Ingresando...';
      spinner.classList.remove('hidden');
      errorEl.classList.add('hidden');

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      const result = await Auth.login(email, password);

      if (result.success) {
        window.location.href = 'index.html';
      } else {
        errorEl.textContent = 'Correo o contraseña incorrectos.';
        errorEl.classList.remove('hidden');
        btn.disabled = false;
        btnText.textContent = 'Iniciar sesión';
        spinner.classList.add('hidden');
      }
    });
  </script>
</body>
</html>
